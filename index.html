<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cubicación de Piedra Industrial</title>
    <!-- Importamos la librería para generar archivos Excel desde el navegador -->
    <script src="https://cloudflare.com"></script>
    <style>
        :root { --primary: #2ecc71; --dark: #2c3e50; --bg: #f5f6fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--dark); }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-top: 0; color: var(--dark); }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        select, input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 10px; color: white; display: flex; align-items: center; justify-content: center; }
        .btn-camera { background: #3498db; }
        .btn-calc { background: var(--primary); }
        .btn-excel { background: #e67e22; }
        #canvasContainer { width: 100%; margin-top: 15px; position: relative; display: none; text-align: center; }
        canvas { max-width: 100%; border-radius: 8px; border: 2px solid #ddd; }
        .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; background: #edf2f7; padding: 15px; border-radius: 8px; }
        .metric-card { text-align: center; }
        .metric-card span { display: block; font-size: 12px; color: #718096; text-transform: uppercase; font-weight: bold; }
        .metric-card strong { font-size: 20px; color: var(--dark); }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; font-size: 12px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h2>🪨 Medidor de Bloques</h2>

    <!-- Controles de configuración -->
    <div class="form-group">
        <label>Material de la Piedra</label>
        <select id="tipoPiedra">
            <option value="2.7">Granito (2.7 t/m³)</option>
            <option value="2.6">Mármol (2.6 t/m³)</option>
            <option value="3.0">Basalto (3.0 t/m³)</option>
            <option value="2.5">Caliza (2.5 t/m³)</option>
            <option value="2.8">Pizarra (2.8 t/m³)</option>
        </select>
    </div>

    <div class="form-group">
        <label>Fondo / Grosor del Bloque (metros)</label>
        <input type="number" id="fondoMetros" value="1.50" step="0.05">
    </div>

    <div class="form-group">
        <label>Calibración Óptica (cm por Píxel)</label>
        <input type="number" id="cmPixel" value="0.45" step="0.01">
    </div>

    <!-- Botón que activa la cámara trasera o galería del móvil nativamente -->
    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display: none;">
    <button class="btn btn-camera" onclick="document.getElementById('fileInput').click()">📸 Tomar Foto / Galería</button>
    <button class="btn btn-calc" id="btnCalcular" disabled onclick="procesarYMedir()">📐 Calcular Cubicación</button>
    <button class="btn btn-excel" onclick="descargarExcel()">📥 Descargar Reporte Excel</button>

    <!-- Contenedor del procesamiento visual -->
    <div id="canvasContainer">
        <canvas id="canvasPreview"></canvas>
    </div>

    <!-- Panel de resultados en pantalla -->
    <div class="metrics">
        <div class="metric-card"><span>Ancho</span><strong id="resAncho">- m</strong></div>
        <div class="metric-card"><span>Alto</span><strong id="resAlto">- m</strong></div>
        <div class="metric-card"><span>Volumen</span><strong id="resVolumen">- m³</strong></div>
        <div class="metric-card"><span>Peso Est.</span><strong id="resPeso">- t</strong></div>
    </div>

    <!-- Tabla de historial del lote -->
    <table id="tablaHistorial">
        <thead>
            <tr>
                <th>Fecha/Hora</th>
                <th>Ancho (m)</th>
                <th>Alto (m)</th>
                <th>Volumen (m³)</th>
                <th>Peso (t)</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let imgOriginal = new Image();
    let historialDatos = [];

    // Capturar la imagen cargada
    document.getElementById('fileInput').addEventListener('change', function(e) {
        if(e.target.files.length === 0) return;
        let reader = new FileReader();
        reader.onload = function(event) {
            imgOriginal.onload = function() {
                let canvas = document.getElementById('canvasPreview');
                let ctx = canvas.getContext('2d');
                canvas.width = imgOriginal.width;
                canvas.height = imgOriginal.height;
                ctx.drawImage(imgOriginal, 0, 0);
                document.getElementById('canvasContainer').style.display = 'block';
                document.getElementById('btnCalcular').disabled = false;
            }
            imgOriginal.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    });

    // Procesamiento matemático de las dimensiones del bloque
    function procesarYMedir() {
        let canvas = document.getElementById('canvasPreview');
        let ctx = canvas.getContext('2d');
        
        // Simulación de detección perimetral automática (cuadro delimitador del objeto central)
        // En web pura emulamos el área activa restando márgenes de seguridad para aislar el centro
        let x = Math.round(canvas.width * 0.15);
        let y = Math.round(canvas.height * 0.25);
        let w = Math.round(canvas.width * 0.70);
        let h = Math.round(canvas.height * 0.50);

        // Volver a dibujar la imagen limpia antes de trazar
        ctx.drawImage(imgOriginal, 0, 0);

        // Dibujar recuadro industrial verde hiper-visible
        ctx.strokeStyle = "#2ecc71";
        ctx.lineWidth = Math.max(4, canvas.width * 0.008);
        ctx.strokeRect(x, y, w, h);

        // Variables de conversión de la UI
        let cmPixel = parseFloat(document.getElementById('cmPixel').value);
        let fondo = parseFloat(document.getElementById('fondoMetros').value);
        let densidad = parseFloat(document.getElementById('tipoPiedra').value);

        // Fórmulas de cubicación industrial
        let anchoM = (w * cmPixel) / 100;
        let altoM = (h * cmPixel) / 100;
        let volumenM3 = anchoM * altoM * fondo;
        let pesoT = volumenM3 * densidad;

        // Actualizar tarjetas de interfaz de usuario
        document.getElementById('resAncho').innerText = anchoM.toFixed(2) + " m";
        document.getElementById('resAlto').innerText = altoM.toFixed(2) + " m";
        document.getElementById('resVolumen').innerText = volumenM3.toFixed(2) + " m³";
        document.getElementById('resPeso').innerText = pesoT.toFixed(2) + " t";

        // Registrar datos en la tabla e historial
        let ahora = new Date().toLocaleString();
        historialDatos.push({
            "Fecha y Hora": ahora,
            "Ancho (m)": anchoM.toFixed(2),
            "Alto (m)": altoM.toFixed(2),
            "Volumen (m3)": volumenM3.toFixed(3),
            "Peso (t)": pesoT.toFixed(2)
        });

        let tbody = document.getElementById('tablaHistorial').getElementsByTagName('tbody')[0];
        let fila = tbody.insertRow(0);
        fila.innerHTML = `<td>${ahora}</td><td>${anchoM.toFixed(2)}</td><td>${altoM.toFixed(2)}</td><td>${volumenM3.toFixed(3)}</td><td>${pesoT.toFixed(2)}</td>`;
    }

    // Exportar el lote completo a Excel descargable de forma nativa
    function descargarExcel() {
        if(historialDatos.length === 0) {
            alert("⚠️ Realiza al menos una medición para exportar datos.");
            return;
        }
        let hoja = XLSX.utils.json_to_sheet(historialDatos);
        let libro = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(libro, hoja, "Mediciones");
        XLSX.writeFile(libro, "reporte_cubicacion_piedra.xlsx");
    }
</script>
</body>
</html>
