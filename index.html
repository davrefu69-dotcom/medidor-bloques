<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cubicación de Piedra Industrial</title>
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>🪨 CONTROL DE CUBICACIÓN V3</h2>

        <div class="panel-config">
            <div class="form-group">
                <label>⚙️ MATERIAL DE LA PIEDRA</label>
                <select id="tipoPiedra">
                    <option value="2.7">Granito (2.7 t/m³)</option>
                    <option value="2.6">Mármol (2.6 t/m³)</option>
                    <option value="3.0">Basalto (3.0 t/m³)</option>
                    <option value="2.5">Caliza (2.5 t/m³)</option>
                    <option value="2.8">Pizarra (2.8 t/m³)</option>
                </select>
            </div>
            <div class="form-group">
                <label>📐 FONDO / GROSOR DEL BLOQUE (M)</label>
                <input type="number" id="fondoMetros" value="1.50" step="0.05">
            </div>
            <div class="form-group">
                <label>📏 CALIBRACIÓN ÓPTICA (CM/PX)</label>
                <input type="number" id="cmPixel" value="0.45" step="0.01">
            </div>
        </div>

        <input type="file" id="inputCamara" accept="image/*" capture="environment" style="display: none;">
        <input type="file" id="inputGaleria" accept="image/*" style="display: none;">
        
        <button class="btn-large btn-camera" id="btnCamara">📸 1. TOMAR FOTO (CÁMARA)</button>
        <button class="btn-large btn-gallery" id="btnGaleria">🖼️ 2. SUBIR DESDE GALERÍA</button>
        
        <div id="instrucciones" class="instrucciones">👉 ALINEACIÓN TÁCTIL: Arrastra las 4 esquinas rojas hasta los bordes exactos del bloque de piedra.</div>

        <div class="pantalla-monitoreo" id="contenedorMonitoreo">
            <div class="placeholder-texto" id="textoEspera">
                📺 MONITOR INACTIVO<br>
                <span style="font-size:14px; font-weight:normal;">Selecciona una foto para encender el visor móvil</span>
            </div>
            <canvas id="canvasPreview"></canvas>
        </div>

        <button class="btn-large btn-save" id="btnRegistrar" disabled>💾 3. GUARDAR ESTA MEDICIÓN</button>
        <button class="btn-large btn-excel" id="btnExcel">📥 4. DESCARGAR REPORTE EXCEL</button>

        <div class="metrics" id="panelMetricas"></div>

        <div class="historial-header">
            <h2 style="font-size:20px; border:none; margin:0; padding:0;">🗂️ HISTORIAL</h2>
            <button class="btn-large btn-clear" id="btnLimpiar">🗑️ BORRAR TODO</button>
        </div>
        <div class="table-responsive" id="panelTabla"></div>
    </div>

    <!-- Carga Modular del Ecosistema de Scripts -->
    <script src="config.js"></script>
    <script src="ui.js"></script>
    <script src="math.js"></script>
    <script src="canvas.js"></script>
    <script src="excel.js"></script>
    <script src="loader.js"></script>
    <script src="touch.js"></script>
    <script src="mouse.js"></script>
    <script src="app.js"></script>
</body>
</html>
